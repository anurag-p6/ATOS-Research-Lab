<svg xmlns="http://www.w3.org/2000/svg" width="720" height="380" viewBox="0 0 720 380" role="img" aria-labelledby="title desc">
  <title id="title">Vercel Framework and Build settings</title>
  <desc id="desc">Framework Next.js, Output Directory empty, build pnpm build</desc>
  <rect width="720" height="380" rx="12" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <text x="24" y="36" fill="#ededed" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Build &amp; Development Settings</text>
  <text x="24" y="56" fill="#888" font-family="system-ui,sans-serif" font-size="11">Framework Preset · Build · Output</text>
  <rect x="24" y="72" width="672" height="1" fill="#2a2a2a"/>

  <text x="24" y="108" fill="#ededed" font-family="system-ui,sans-serif" font-size="13" font-weight="500">Framework Preset</text>
  <rect x="24" y="118" width="280" height="40" rx="6" fill="#171717" stroke="#444" stroke-width="1"/>
  <circle cx="44" cy="138" r="10" fill="#000"/>
  <text x="48" y="142" fill="#fff" font-family="system-ui,sans-serif" font-size="12" font-weight="700" text-anchor="middle">˛</text>
  <text x="64" y="144" fill="#ededed" font-family="system-ui,sans-serif" font-size="13">Next.js</text>

  <text x="24" y="198" fill="#ededed" font-family="system-ui,sans-serif" font-size="13" font-weight="500">Build Command</text>
  <rect x="24" y="208" width="400" height="40" rx="6" fill="#171717" stroke="#444" stroke-width="1"/>
  <text x="40" y="234" fill="#ededed" font-family="ui-monospace,monospace" font-size="13">pnpm build</text>

  <text x="24" y="278" fill="#ededed" font-family="system-ui,sans-serif" font-size="13" font-weight="500">Output Directory</text>
  <rect x="24" y="288" width="400" height="40" rx="6" fill="#171717" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/>
  <text x="40" y="314" fill="#666" font-family="ui-monospace,monospace" font-size="13" font-style="italic">(leave empty)</text>

  <rect x="440" y="288" width="256" height="56" rx="8" fill="#2a1515" stroke="#ef4444" stroke-width="1"/>
  <text x="456" y="312" fill="#ef4444" font-family="system-ui,sans-serif" font-size="11" font-weight="600"> Do NOT set "public"</text>
  <text x="456" y="330" fill="#aaa" font-family="system-ui,sans-serif" font-size="10">That causes: No Output Directory named public</text>

  <rect x="24" y="348" width="672" height="1" fill="#2a2a2a"/>
</svg>
