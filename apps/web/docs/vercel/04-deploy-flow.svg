<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200" role="img" aria-labelledby="title desc">
  <title id="title">ATOS Vercel deploy flow</title>
  <desc id="desc">Git push to Vercel build and Next.js serverless deploy</desc>
  <rect width="720" height="200" rx="12" fill="#0a0a0a" stroke="#333" stroke-width="1"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3ecf8e"/>
    </marker>
  </defs>

  <rect x="24" y="70" width="120" height="60" rx="8" fill="#171717" stroke="#444"/>
  <text x="84" y="98" fill="#ededed" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" font-weight="600">Git push</text>
  <text x="84" y="114" fill="#888" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">main branch</text>

  <line x1="144" y1="100" x2="168" y2="100" stroke="#3ecf8e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="168" y="70" width="140" height="60" rx="8" fill="#171717" stroke="#3ecf8e"/>
  <text x="238" y="98" fill="#3ecf8e" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" font-weight="600">apps/web</text>
  <text x="238" y="114" fill="#888" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">pnpm build</text>

  <line x1="308" y1="100" x2="332" y2="100" stroke="#3ecf8e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="332" y="70" width="140" height="60" rx="8" fill="#171717" stroke="#444"/>
  <text x="402" y="98" fill="#ededed" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" font-weight="600">.next</text>
  <text x="402" y="114" fill="#888" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">Next.js output</text>

  <line x1="472" y1="100" x2="496" y2="100" stroke="#3ecf8e" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="496" y="70" width="200" height="60" rx="8" fill="#1a2e1a" stroke="#3ecf8e"/>
  <text x="596" y="98" fill="#3ecf8e" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle" font-weight="600">atos-*.vercel.app</text>
  <text x="596" y="114" fill="#aaa" font-family="system-ui,sans-serif" font-size="9" text-anchor="middle">SSR + /api routes</text>

  <text x="360" y="36" fill="#ededed" font-family="system-ui,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Correct deploy path (not static public/)</text>
  <text x="360" y="178" fill="#888" font-family="system-ui,sans-serif" font-size="10" text-anchor="middle">vercel.json ’ framework: nextjs</text>
</svg>
