[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
# Ethereum Sepolia (EVM, chain id 11155111)
sepolia = "${SEPOLIA_RPC_URL}"
# Filecoin FEVM Calibration testnet (chain id 314159). There is no separate “Filecoin Sepolia”; this is Filecoin’s public EVM testnet.
filecoin-calibration = "${FILECOIN_CALIBRATION_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
# Blockscout hosts a Sourcify/Etherscan-compatible API for Calibration (not etherscan.io).
filecoin-calibration = { chain = "314159", key = "${FILECOIN_BLOCKSCOUT_API_KEY}", url = "https://filecoin-testnet.blockscout.com/api" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
